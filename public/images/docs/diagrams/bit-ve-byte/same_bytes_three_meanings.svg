<svg xmlns="http://www.w3.org/2000/svg" width="680" height="320" viewBox="0 0 680 320" font-family="ui-monospace, 'Cascadia Code', 'Source Code Pro', monospace">
  <!-- Background -->
  <rect width="680" height="320" fill="#F6F7F9" rx="12"/>

  <!-- Title -->
  <text x="340" y="26" text-anchor="middle" font-size="13" font-weight="600" fill="#404756" font-family="ui-sans-serif, system-ui, sans-serif">Same bytes, different interpretations</text>

  <!-- Center bytes box -->
  <rect x="220" y="110" width="240" height="64" rx="10" fill="white" stroke="#087EA4" stroke-width="2"/>
  <text x="340" y="135" text-anchor="middle" font-size="12" fill="#99A1B3" font-family="ui-sans-serif, system-ui, sans-serif">two bytes in memory</text>
  <text x="340" y="160" text-anchor="middle" font-size="17" font-weight="700" fill="#23272F" letter-spacing="2">01001000  01101001</text>

  <!-- ===== Arrow 1: Text (top-left) ===== -->
  <!-- Arrow line -->
  <line x1="258" y1="110" x2="130" y2="68" stroke="#C8CBD0" stroke-width="1.5"/>
  <polygon points="126,62 134,72 136,61" fill="#C8CBD0"/>

  <!-- Label on arrow -->
  <rect x="148" y="74" width="120" height="18" rx="4" fill="#F6F7F9"/>
  <text x="208" y="86" text-anchor="middle" font-size="10" fill="#99A1B3" font-family="ui-sans-serif, system-ui, sans-serif">read as text (ASCII)</text>

  <!-- Result box 1: Text -->
  <rect x="20" y="20" width="110" height="52" rx="8" fill="white" stroke="#EBECF0" stroke-width="1.5"/>
  <text x="75" y="42" text-anchor="middle" font-size="11" fill="#99A1B3" font-family="ui-sans-serif, system-ui, sans-serif">ASCII text</text>
  <text x="75" y="62" text-anchor="middle" font-size="26" font-weight="800" fill="#087EA4" font-family="ui-sans-serif, system-ui, sans-serif">Hi</text>

  <!-- ===== Arrow 2: Number (right) ===== -->
  <line x1="460" y1="142" x2="556" y2="142" stroke="#C8CBD0" stroke-width="1.5"/>
  <polygon points="556,137 566,142 556,147" fill="#C8CBD0"/>

  <!-- Label on arrow -->
  <rect x="462" y="128" width="92" height="18" rx="4" fill="#F6F7F9"/>
  <text x="508" y="140" text-anchor="middle" font-size="10" fill="#99A1B3" font-family="ui-sans-serif, system-ui, sans-serif">read as number</text>

  <!-- Result box 2: Integer -->
  <rect x="570" y="116" width="90" height="52" rx="8" fill="white" stroke="#EBECF0" stroke-width="1.5"/>
  <text x="615" y="135" text-anchor="middle" font-size="11" fill="#99A1B3" font-family="ui-sans-serif, system-ui, sans-serif">16-bit int</text>
  <text x="615" y="158" text-anchor="middle" font-size="20" font-weight="800" fill="#23272F" font-family="ui-sans-serif, system-ui, sans-serif">18537</text>

  <!-- ===== Arrow 3: Pixel (bottom-left) ===== -->
  <line x1="258" y1="174" x2="130" y2="252" stroke="#C8CBD0" stroke-width="1.5"/>
  <polygon points="126,258 134,248 136,259" fill="#C8CBD0"/>

  <!-- Label on arrow -->
  <rect x="148" y="224" width="108" height="18" rx="4" fill="#F6F7F9"/>
  <text x="202" y="236" text-anchor="middle" font-size="10" fill="#99A1B3" font-family="ui-sans-serif, system-ui, sans-serif">read as pixel color</text>

  <!-- Result box 3: Color -->
  <rect x="20" y="248" width="110" height="52" rx="8" fill="white" stroke="#EBECF0" stroke-width="1.5"/>
  <text x="75" y="267" text-anchor="middle" font-size="11" fill="#99A1B3" font-family="ui-sans-serif, system-ui, sans-serif">pixel (R=72 G=105)</text>
  <rect x="30" y="274" width="90" height="20" rx="4" fill="#486975"/>

  <!-- Bottom note -->
  <text x="340" y="305" text-anchor="middle" font-size="11" fill="#99A1B3" font-family="ui-sans-serif, system-ui, sans-serif">A byte carries no type — the reader decides the meaning</text>
</svg>
