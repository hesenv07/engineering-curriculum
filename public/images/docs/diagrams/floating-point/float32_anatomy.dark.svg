<text x="174" y="250" text-anchor="start" font-size="16" fill="#F6F7F9">→  1.01₂  (implicit 1. restored)</text>
<text x="360" y="294" text-anchor="middle" font-size="18" fill="#F6F7F9">+1.01₂ × 2⁻³  =  0.00101₂  =  0.15625 ✓</text>
