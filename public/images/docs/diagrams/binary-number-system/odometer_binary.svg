<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 300" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <text x="170" y="28" text-anchor="middle" font-size="14" fill="#23272F" font-family="system-ui, sans-serif">base 2 odometer</text>

  <!-- before: 01 -->
  <g>
    <rect x="55" y="52" width="52" height="66" rx="9" fill="none" stroke="#99A1B3" stroke-width="1.5"/>
    <rect x="117" y="52" width="52" height="66" rx="9" fill="none" stroke="#99A1B3" stroke-width="1.5"/>
    <text x="81"  y="96" text-anchor="middle" font-size="34" fill="#23272F">0</text>
    <text x="143" y="96" text-anchor="middle" font-size="34" fill="#23272F">1</text>
    <text x="143" y="136" text-anchor="middle" font-size="11" fill="#C1554D" font-family="system-ui, sans-serif">wheel is full!</text>
  </g>

  <!-- +1 arrow -->
  <g>
    <line x1="196" y1="85" x2="232" y2="85" stroke="#087EA4" stroke-width="2"/>
    <path d="M 232 85 l -8 -5 v 10 z" fill="#087EA4"/>
    <text x="214" y="72" text-anchor="middle" font-size="12" fill="#087EA4">+1</text>
  </g>

  <!-- after: 10 -->
  <g>
    <rect x="245" y="52" width="40" height="66" rx="9" fill="#087EA4" fill-opacity="0.12" stroke="#087EA4" stroke-width="2"/>
    <text x="265" y="96" text-anchor="middle" font-size="30" fill="#087EA4">1</text>
  </g>
  <g>
    <rect x="291" y="52" width="40" height="66" rx="9" fill="#087EA4" fill-opacity="0.12" stroke="#087EA4" stroke-width="2"/>
    <text x="311" y="96" text-anchor="middle" font-size="30" fill="#087EA4">0</text>
  </g>

  <text x="170" y="188" text-anchor="middle" font-size="26" fill="#23272F">01 &#8594; 10</text>
  <text x="170" y="226" text-anchor="middle" font-size="12" fill="#99A1B3" font-family="system-ui, sans-serif">exactly the same carry rule &#8212;</text>
  <text x="170" y="244" text-anchor="middle" font-size="12" fill="#99A1B3" font-family="system-ui, sans-serif">so so &#8220;10&#8221; here means <tspan fill="#087EA4">two</tspan>, not ten#8220;10so &#8220;10&#8221; here means <tspan fill="#087EA4">two</tspan>, not ten#8221; here means two, not ten</text>
  <text x="170" y="278" text-anchor="middle" font-size="12" fill="#99A1B3" font-family="system-ui, sans-serif">wheel fills after just 2 digits</text>
</svg>
