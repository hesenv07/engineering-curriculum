<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 370" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <defs>
    <marker id="arrHX" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#149ECA"/>
    </marker>
  </defs>
  <text x="360" y="30" text-anchor="middle" font-size="16" fill="#F6F7F9" font-family="system-ui, sans-serif">Split bits into groups of 4 &#8212; each group becomes one hex digit</text>

  <g font-size="25" text-anchor="middle">
    <rect x="52"  y="56" width="132" height="52" rx="9" fill="none" stroke="#99A1B3" stroke-width="1.5"/>
    <rect x="204" y="56" width="132" height="52" rx="9" fill="none" stroke="#99A1B3" stroke-width="1.5"/>
    <rect x="384" y="56" width="132" height="52" rx="9" fill="none" stroke="#99A1B3" stroke-width="1.5"/>
    <rect x="536" y="56" width="132" height="52" rx="9" fill="none" stroke="#99A1B3" stroke-width="1.5"/>
    <text x="118" y="91" fill="#F6F7F9">1010</text>
    <text x="270" y="91" fill="#F6F7F9">1111</text>
    <text x="450" y="91" fill="#F6F7F9">0101</text>
    <text x="602" y="91" fill="#F6F7F9">0011</text>
  </g>

  <g stroke="#149ECA" stroke-width="2" fill="none">
    <line x1="118" y1="118" x2="118" y2="158" marker-end="url(#arrHX)"/>
    <line x1="270" y1="118" x2="270" y2="158" marker-end="url(#arrHX)"/>
    <line x1="450" y1="118" x2="450" y2="158" marker-end="url(#arrHX)"/>
    <line x1="602" y1="118" x2="602" y2="158" marker-end="url(#arrHX)"/>
  </g>
  <g font-size="12" fill="#99A1B3" font-family="system-ui, sans-serif">
    <text x="132" y="144">= 10</text>
    <text x="284" y="144">= 15</text>
    <text x="464" y="144">= 5</text>
    <text x="616" y="144">= 3</text>
  </g>

  <g font-size="40" text-anchor="middle" fill="#149ECA" font-weight="bold">
    <text x="118" y="204">A</text>
    <text x="270" y="204">F</text>
    <text x="450" y="204">5</text>
    <text x="602" y="204">3</text>
  </g>

  <!-- byte brackets -->
  <g stroke="#99A1B3" stroke-width="1.5" fill="none">
    <path d="M 60 226 v 12 h 268 v -12"/>
    <path d="M 392 226 v 12 h 268 v -12"/>
  </g>
  <g font-size="12" fill="#99A1B3" font-family="system-ui, sans-serif" text-anchor="middle">
    <text x="194" y="258">one byte = exactly two hex digits</text>
    <text x="526" y="258">one byte = exactly two hex digits</text>
  </g>

  <text x="360" y="308" text-anchor="middle" font-size="28" fill="#F6F7F9"><tspan fill="#149ECA" font-weight="bold">0xAF53</tspan></text>
  <text x="360" y="344" text-anchor="middle" font-size="13" fill="#99A1B3" font-family="system-ui, sans-serif">16 = 2&#8308;, so the conversion is pure substitution &#8212; no arithmetic, ever</text>
</svg>
