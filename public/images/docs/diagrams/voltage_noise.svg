<svg xmlns="http://www.w3.org/2000/svg" width="720" height="340" viewBox="0 0 720 340" font-family="ui-sans-serif, system-ui, sans-serif">
  <!-- Background -->
  <rect width="720" height="340" fill="#F6F7F9" rx="12"/>

  <!-- Title -->
  <text x="360" y="26" text-anchor="middle" font-size="13" font-weight="600" fill="#404756">Same noise — but binary leaves no room for error</text>

  <!-- ===== LEFT PANEL: 10-level system ===== -->
  <rect x="20" y="40" width="320" height="280" rx="10" fill="white" stroke="#EBECF0" stroke-width="1.5"/>
  <text x="180" y="62" text-anchor="middle" font-size="12" font-weight="700" fill="#E03E3E">10-level (decimal) system</text>

  <!-- Voltage bands -->
  <defs>
    <clipPath id="leftClip">
      <rect x="60" y="70" width="260" height="220"/>
    </clipPath>
  </defs>

  <!-- 10 horizontal bands -->
  <rect x="60" y="70"  width="260" height="22" fill="#FEF3F2" opacity="0.6"/>
  <rect x="60" y="92"  width="260" height="22" fill="#FEE9E7" opacity="0.6"/>
  <rect x="60" y="114" width="260" height="22" fill="#FEF3F2" opacity="0.6"/>
  <rect x="60" y="136" width="260" height="22" fill="#FEE9E7" opacity="0.6"/>
  <rect x="60" y="158" width="260" height="22" fill="#FEF3F2" opacity="0.6"/>
  <rect x="60" y="180" width="260" height="22" fill="#FEE9E7" opacity="0.6"/>
  <rect x="60" y="202" width="260" height="22" fill="#FEF3F2" opacity="0.6"/>
  <rect x="60" y="224" width="260" height="22" fill="#FEE9E7" opacity="0.6"/>
  <rect x="60" y="246" width="260" height="22" fill="#FEF3F2" opacity="0.6"/>
  <rect x="60" y="268" width="260" height="22" fill="#FEE9E7" opacity="0.6"/>

  <!-- Band labels -->
  <text x="52" y="84"  text-anchor="end" font-size="9" fill="#E03E3E" font-weight="600">9</text>
  <text x="52" y="106" text-anchor="end" font-size="9" fill="#E03E3E" font-weight="600">8</text>
  <text x="52" y="128" text-anchor="end" font-size="9" fill="#E03E3E" font-weight="600">7</text>
  <text x="52" y="150" text-anchor="end" font-size="9" fill="#E03E3E" font-weight="600">6</text>
  <text x="52" y="172" text-anchor="end" font-size="9" fill="#E03E3E" font-weight="600">5</text>
  <text x="52" y="194" text-anchor="end" font-size="9" fill="#E03E3E" font-weight="600">4</text>
  <text x="52" y="216" text-anchor="end" font-size="9" fill="#E03E3E" font-weight="600">3</text>
  <text x="52" y="238" text-anchor="end" font-size="9" fill="#E03E3E" font-weight="600">2</text>
  <text x="52" y="260" text-anchor="end" font-size="9" fill="#E03E3E" font-weight="600">1</text>
  <text x="52" y="282" text-anchor="end" font-size="9" fill="#E03E3E" font-weight="600">0</text>

  <!-- Noisy signal crossing bands -->
  <polyline clip-path="url(#leftClip)"
    points="60,180 80,175 95,185 110,168 120,158 130,162 140,148 150,155 158,165 165,158 170,147 180,153 190,162 200,148 210,136 215,148 225,158 230,165 240,153 250,163 260,170 270,160 280,172 290,165 300,175 310,168 320,178"
    fill="none" stroke="#E03E3E" stroke-width="2" stroke-linejoin="round"/>

  <!-- Error X marks where it crosses band boundaries -->
  <text x="138" y="151" font-size="14" fill="#E03E3E" font-weight="700">✕</text>
  <text x="208" y="139" font-size="14" fill="#E03E3E" font-weight="700">✕</text>

  <!-- Band boundary lines -->
  <line x1="60" y1="92"  x2="320" y2="92"  stroke="#E0A0A0" stroke-width="0.5"/>
  <line x1="60" y1="114" x2="320" y2="114" stroke="#E0A0A0" stroke-width="0.5"/>
  <line x1="60" y1="136" x2="320" y2="136" stroke="#E0A0A0" stroke-width="0.5"/>
  <line x1="60" y1="158" x2="320" y2="158" stroke="#E0A0A0" stroke-width="0.5"/>
  <line x1="60" y1="180" x2="320" y2="180" stroke="#E0A0A0" stroke-width="0.5"/>
  <line x1="60" y1="202" x2="320" y2="202" stroke="#E0A0A0" stroke-width="0.5"/>
  <line x1="60" y1="224" x2="320" y2="224" stroke="#E0A0A0" stroke-width="0.5"/>
  <line x1="60" y1="246" x2="320" y2="246" stroke="#E0A0A0" stroke-width="0.5"/>
  <line x1="60" y1="268" x2="320" y2="268" stroke="#E0A0A0" stroke-width="0.5"/>

  <!-- Caption -->
  <text x="180" y="310" text-anchor="middle" font-size="11" fill="#E03E3E">Signal drifts across band boundaries → errors</text>

  <!-- ===== RIGHT PANEL: Binary system ===== -->
  <rect x="380" y="40" width="320" height="280" rx="10" fill="white" stroke="#EBECF0" stroke-width="1.5"/>
  <text x="540" y="62" text-anchor="middle" font-size="12" font-weight="700" fill="#087EA4">Binary system</text>

  <defs>
    <clipPath id="rightClip">
      <rect x="420" y="70" width="260" height="220"/>
    </clipPath>
  </defs>

  <!-- Two zones: 0 zone and 1 zone -->
  <rect x="420" y="70"  width="260" height="80" fill="#F0F9FF" opacity="0.8"/>
  <rect x="420" y="150" width="260" height="40" fill="#F6F7F9" opacity="0.6"/>
  <rect x="420" y="190" width="260" height="100" fill="#E6F7FF" opacity="0.8"/>

  <!-- Zone labels -->
  <text x="414" y="110" text-anchor="end" font-size="11" fill="#087EA4" font-weight="700">1</text>
  <text x="414" y="272" text-anchor="end" font-size="11" fill="#087EA4" font-weight="700">0</text>
  <text x="414" y="173" text-anchor="end" font-size="9" fill="#99A1B3">buffer</text>

  <!-- Buffer zone label -->
  <line x1="420" y1="150" x2="680" y2="150" stroke="#C8CBD0" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="420" y1="190" x2="680" y2="190" stroke="#C8CBD0" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Same noisy signal but stays within zones -->
  <polyline clip-path="url(#rightClip)"
    points="420,240 440,235 455,245 470,228 480,218 490,222 500,208 510,215 518,225 525,218 530,207 540,213 550,222 560,208 570,200 575,212 585,222 590,229 600,213 610,225 620,232 630,220 640,234 650,225 660,237 670,228 680,238"
    fill="none" stroke="#087EA4" stroke-width="2" stroke-linejoin="round"/>

  <!-- Check mark -->
  <text x="580" y="135" text-anchor="middle" font-size="22" fill="#087EA4">✓</text>
  <text x="580" y="152" text-anchor="middle" font-size="10" fill="#087EA4" font-weight="600">no errors</text>

  <!-- Caption -->
  <text x="540" y="310" text-anchor="middle" font-size="11" fill="#087EA4">Wide buffer zone — noise can't cause errors</text>
</svg>
