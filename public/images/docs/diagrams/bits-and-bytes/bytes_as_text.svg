<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 280" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <text x="170" y="30" text-anchor="middle" font-size="14" fill="#23272F" font-family="system-ui, sans-serif">read as text (ASCII)</text>
  <rect x="30" y="52" width="130" height="48" rx="8" fill="none" stroke="#99A1B3" stroke-width="1.5"/>
  <rect x="180" y="52" width="130" height="48" rx="8" fill="none" stroke="#99A1B3" stroke-width="1.5"/>
  <text x="95"  y="82" text-anchor="middle" font-size="16" fill="#23272F">01001000</text>
  <text x="245" y="82" text-anchor="middle" font-size="16" fill="#23272F">01101001</text>
  <g stroke="#087EA4" stroke-width="2">
    <line x1="95"  y1="108" x2="95"  y2="150"/>
    <line x1="245" y1="108" x2="245" y2="150"/>
  </g>
  <text x="95"  y="140" text-anchor="middle" font-size="11" fill="#99A1B3" font-family="system-ui, sans-serif">= 72</text>
  <text x="245" y="140" text-anchor="middle" font-size="11" fill="#99A1B3" font-family="system-ui, sans-serif">= 105</text>
  <text x="95"  y="196" text-anchor="middle" font-size="42" fill="#087EA4" font-weight="bold">H</text>
  <text x="245" y="196" text-anchor="middle" font-size="42" fill="#087EA4" font-weight="bold">i</text>
  <text x="170" y="248" text-anchor="middle" font-size="12" fill="#99A1B3" font-family="system-ui, sans-serif">each byte looked up in the character table</text>
</svg>
