<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <text x="360" y="28" text-anchor="middle" font-size="16" fill="#F6F7F9" font-family="system-ui, sans-serif">The same electrical noise &#8212; two very different outcomes</text>

  <!-- LEFT: decimal, 10 narrow bands -->
  <g>
    <text x="185" y="58" text-anchor="middle" font-size="13" fill="#99A1B3" font-family="system-ui, sans-serif">10 voltage levels (decimal signal)</text>
    <rect x="60" y="70" width="250" height="200" rx="8" fill="none" stroke="#99A1B3" stroke-width="1.5"/>
    <g stroke="#99A1B3" stroke-width="0.8">
      <line x1="60" y1="90"  x2="310" y2="90"/>
      <line x1="60" y1="110" x2="310" y2="110"/>
      <line x1="60" y1="130" x2="310" y2="130"/>
      <line x1="60" y1="150" x2="310" y2="150"/>
      <line x1="60" y1="170" x2="310" y2="170"/>
      <line x1="60" y1="190" x2="310" y2="190"/>
      <line x1="60" y1="210" x2="310" y2="210"/>
      <line x1="60" y1="230" x2="310" y2="230"/>
      <line x1="60" y1="250" x2="310" y2="250"/>
    </g>
    <!-- noisy signal intended to sit at level y=160 band but wobbles across lines -->
    <polyline points="65,166 90,150 115,172 140,148 165,168 190,146 215,170 240,152 265,174 300,154"
      fill="none" stroke="#E06C60" stroke-width="2.5"/>
    <text x="185" y="296" text-anchor="middle" font-size="14" fill="#E06C60" font-family="system-ui, sans-serif">wobble crosses band borders &#8594; is it a 4 or a 5?</text>
  </g>

  <!-- RIGHT: binary, 2 wide zones -->
  <g>
    <text x="535" y="58" text-anchor="middle" font-size="13" fill="#99A1B3" font-family="system-ui, sans-serif">2 voltage zones (binary signal)</text>
    <rect x="410" y="70" width="250" height="200" rx="8" fill="none" stroke="#99A1B3" stroke-width="1.5"/>
    <rect x="410" y="70" width="250" height="60" fill="#149ECA" fill-opacity="0.08"/>
    <rect x="410" y="210" width="250" height="60" fill="#149ECA" fill-opacity="0.08"/>
    <text x="672" y="104" font-size="13" fill="#149ECA">1</text>
    <text x="672" y="244" font-size="13" fill="#149ECA">0</text>
    <text x="535" y="175" text-anchor="middle" font-size="12" fill="#99A1B3" font-family="system-ui, sans-serif">wide empty buffer zone</text>
    <!-- same wobble, safely inside the top zone -->
    <polyline points="415,106 440,90 465,112 490,88 515,108 540,86 565,110 590,92 615,114 655,94"
      fill="none" stroke="#149ECA" stroke-width="2.5"/>
    <text x="535" y="296" text-anchor="middle" font-size="14" fill="#149ECA" font-family="system-ui, sans-serif">same wobble, still clearly a 1 &#10003;</text>
  </g>

  <text x="360" y="338" text-anchor="middle" font-size="13" fill="#99A1B3" font-family="system-ui, sans-serif">Binary wins for a physical reason, not a mathematical one: two states survive noise that ten states cannot</text>
</svg>
