<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
<text x="360" y="26" text-anchor="middle" font-size="15" fill="#F6F7F9" font-family="system-ui, sans-serif">DEFLATE = LZ77 + Huffman (what a ZIP entry actually stores)</text>

<rect x="30" y="90" width="150" height="80" rx="8" fill="#F6F7F9" fill-opacity="0.08" stroke="#F6F7F9" stroke-width="1.6"/>
<text x="105" y="126" text-anchor="middle" font-size="16" fill="#F6F7F9">raw</text>
<text x="105" y="148" text-anchor="middle" font-size="13" fill="#99A1B3" font-family="system-ui, sans-serif">text</text>

<path d="M182,130 L196,130" stroke="#99A1B3" stroke-width="1.8" marker-end="url(#arrow1d)"/>

<rect x="200" y="90" width="150" height="80" rx="8" fill="#149ECA" fill-opacity="0.16" stroke="#149ECA" stroke-width="1.8"/>
<text x="275" y="126" text-anchor="middle" font-size="16" fill="#F6F7F9">LZ77</text>
<text x="275" y="148" text-anchor="middle" font-size="13" fill="#149ECA" font-family="system-ui, sans-serif">tokens</text>

<path d="M352,130 L366,130" stroke="#99A1B3" stroke-width="1.8" marker-end="url(#arrow1d)"/>

<rect x="370" y="90" width="150" height="80" rx="8" fill="#149ECA" fill-opacity="0.16" stroke="#149ECA" stroke-width="1.8"/>
<text x="445" y="126" text-anchor="middle" font-size="16" fill="#F6F7F9">Huffman</text>
<text x="445" y="148" text-anchor="middle" font-size="13" fill="#149ECA" font-family="system-ui, sans-serif">short codes</text>

<path d="M522,130 L536,130" stroke="#99A1B3" stroke-width="1.8" marker-end="url(#arrow1d)"/>

<rect x="540" y="90" width="150" height="80" rx="8" fill="#E06C60" fill-opacity="0.16" stroke="#E06C60" stroke-width="1.8"/>
<text x="615" y="120" text-anchor="middle" font-size="16" fill="#F6F7F9">compressed</text>
<text x="615" y="144" text-anchor="middle" font-size="13" fill="#E06C60" font-family="system-ui, sans-serif">+ CRC-32</text>

<defs>
<marker id="arrow1d" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
<path d="M0,0 L8,4 L0,8 Z" fill="#99A1B3"/>
</marker>
</defs>

<text x="360" y="220" text-anchor="middle" font-size="13" fill="#F6F7F9" font-family="system-ui, sans-serif">Pass 1 hunts repeats (LZ77) — Pass 2 shrinks whatever is left (Huffman)</text>
<text x="360" y="248" text-anchor="middle" font-size="12" fill="#99A1B3" font-family="system-ui, sans-serif">RFC 1951 (1996) — the format inside every .zip, .gz, and .png</text>
<text x="360" y="280" text-anchor="middle" font-size="13" fill="#F6F7F9" font-family="system-ui, sans-serif">Two passes over the same data: first hunt repeats, then squeeze what's left.</text>
</svg>
