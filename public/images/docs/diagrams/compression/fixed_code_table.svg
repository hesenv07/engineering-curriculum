<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 300" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
<text x="170" y="24" text-anchor="middle" font-size="14" fill="#23272F" font-family="system-ui, sans-serif">Fixed-length code (2 bits/symbol)</text>

<text x="60" y="54" text-anchor="middle" font-size="12" fill="#99A1B3" font-family="system-ui, sans-serif">symbol</text>
<text x="150" y="54" text-anchor="middle" font-size="12" fill="#99A1B3" font-family="system-ui, sans-serif">code</text>
<text x="250" y="54" text-anchor="middle" font-size="12" fill="#99A1B3" font-family="system-ui, sans-serif">count</text>
<line x1="30" y1="62" x2="310" y2="62" stroke="#99A1B3" stroke-width="1.2"/>

<text x="60" y="82" text-anchor="middle" font-size="16" fill="#23272F">a</text>
<text x="150" y="82" text-anchor="middle" font-size="16" fill="#23272F">00</text>
<text x="250" y="82" text-anchor="middle" font-size="16" fill="#23272F">×3</text>

<text x="60" y="106" text-anchor="middle" font-size="16" fill="#23272F">n</text>
<text x="150" y="106" text-anchor="middle" font-size="16" fill="#23272F">01</text>
<text x="250" y="106" text-anchor="middle" font-size="16" fill="#23272F">×2</text>

<text x="60" y="130" text-anchor="middle" font-size="16" fill="#23272F">b</text>
<text x="150" y="130" text-anchor="middle" font-size="16" fill="#23272F">10</text>
<text x="250" y="130" text-anchor="middle" font-size="16" fill="#23272F">×1</text>

<line x1="30" y1="148" x2="310" y2="148" stroke="#99A1B3" stroke-width="1.2"/>

<text x="30" y="180" text-anchor="start" font-size="12" fill="#99A1B3" font-family="system-ui, sans-serif">6 symbols × 2 bits each:</text>
<rect x="50" y="196" width="240" height="28" rx="6" fill="#C1554D" fill-opacity="0.12" stroke="#C1554D" stroke-width="1.6"/>
<text x="170" y="215" text-anchor="middle" font-size="14" fill="#C1554D" font-family="system-ui, sans-serif">12 bits total</text>
</svg>
