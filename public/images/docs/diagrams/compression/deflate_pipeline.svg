<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
<text x="360" y="26" text-anchor="middle" font-size="15" fill="#23272F" font-family="system-ui, sans-serif">DEFLATE = LZ77 + Huffman (what a ZIP entry actually stores)</text>

<rect x="30" y="90" width="150" height="80" rx="8" fill="#23272F" fill-opacity="0.06" stroke="#23272F" stroke-width="1.6"/>
<text x="105" y="126" text-anchor="middle" font-size="16" fill="#23272F">raw</text>
<text x="105" y="148" text-anchor="middle" font-size="13" fill="#99A1B3" font-family="system-ui, sans-serif">text</text>

<path d="M182,130 L196,130" stroke="#99A1B3" stroke-width="1.8" marker-end="url(#arrow1)"/>

<rect x="200" y="90" width="150" height="80" rx="8" fill="#087EA4" fill-opacity="0.12" stroke="#087EA4" stroke-width="1.8"/>
<text x="275" y="126" text-anchor="middle" font-size="16" fill="#23272F">LZ77</text>
<text x="275" y="148" text-anchor="middle" font-size="13" fill="#087EA4" font-family="system-ui, sans-serif">tokens</text>

<path d="M352,130 L366,130" stroke="#99A1B3" stroke-width="1.8" marker-end="url(#arrow1)"/>

<rect x="370" y="90" width="150" height="80" rx="8" fill="#087EA4" fill-opacity="0.12" stroke="#087EA4" stroke-width="1.8"/>
<text x="445" y="126" text-anchor="middle" font-size="16" fill="#23272F">Huffman</text>
<text x="445" y="148" text-anchor="middle" font-size="13" fill="#087EA4" font-family="system-ui, sans-serif">short codes</text>

<path d="M522,130 L536,130" stroke="#99A1B3" stroke-width="1.8" marker-end="url(#arrow1)"/>

<rect x="540" y="90" width="150" height="80" rx="8" fill="#C1554D" fill-opacity="0.12" stroke="#C1554D" stroke-width="1.8"/>
<text x="615" y="120" text-anchor="middle" font-size="16" fill="#23272F">compressed</text>
<text x="615" y="144" text-anchor="middle" font-size="13" fill="#C1554D" font-family="system-ui, sans-serif">+ CRC-32</text>

<defs>
<marker id="arrow1" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
<path d="M0,0 L8,4 L0,8 Z" fill="#99A1B3"/>
</marker>
</defs>

<text x="360" y="220" text-anchor="middle" font-size="13" fill="#23272F" font-family="system-ui, sans-serif">Pass 1 hunts repeats (LZ77) — Pass 2 shrinks whatever is left (Huffman)</text>
<text x="360" y="248" text-anchor="middle" font-size="12" fill="#99A1B3" font-family="system-ui, sans-serif">RFC 1951 (1996) — the format inside every .zip, .gz, and .png</text>
<text x="360" y="280" text-anchor="middle" font-size="13" fill="#23272F" font-family="system-ui, sans-serif">Two passes over the same data: first hunt repeats, then squeeze what's left.</text>
</svg>
