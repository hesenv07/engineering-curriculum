<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
<text x="360" y="28" text-anchor="middle" font-size="16" fill="#F6F7F9">the four UTF-8 templates</text>
<text x="26" y="84" text-anchor="start" font-size="13" fill="#F6F7F9">U+0000–U+007F</text>
<rect x="196" y="58" width="104" height="40" rx="7" fill="none" stroke="#99A1B3" stroke-width="2"/>
<text x="204" y="84" text-anchor="start" font-size="15" fill="#149ECA" font-weight="bold">0</text>
<text x="213" y="84" text-anchor="start" font-size="15" fill="#99A1B3">xxxxxxx</text>
<text x="694" y="84" text-anchor="end" font-size="13" fill="#F6F7F9" font-family="system-ui, sans-serif">7 bits — plain ASCII</text>
<text x="26" y="146" text-anchor="start" font-size="13" fill="#F6F7F9">U+0080–U+07FF</text>
<rect x="196" y="120" width="104" height="40" rx="7" fill="none" stroke="#99A1B3" stroke-width="2"/>
<text x="204" y="146" text-anchor="start" font-size="15" fill="#149ECA" font-weight="bold">110</text>
<text x="231" y="146" text-anchor="start" font-size="15" fill="#99A1B3">xxxxx</text>
<rect x="310" y="120" width="104" height="40" rx="7" fill="none" stroke="#99A1B3" stroke-width="2"/>
<text x="318" y="146" text-anchor="start" font-size="15" fill="#149ECA" font-weight="bold">10</text>
<text x="336" y="146" text-anchor="start" font-size="15" fill="#99A1B3">xxxxxx</text>
<text x="694" y="146" text-anchor="end" font-size="13" fill="#F6F7F9" font-family="system-ui, sans-serif">11 bits</text>
<text x="26" y="208" text-anchor="start" font-size="13" fill="#F6F7F9">U+0800–U+FFFF</text>
<rect x="196" y="182" width="104" height="40" rx="7" fill="none" stroke="#99A1B3" stroke-width="2"/>
<text x="204" y="208" text-anchor="start" font-size="15" fill="#149ECA" font-weight="bold">1110</text>
<text x="240" y="208" text-anchor="start" font-size="15" fill="#99A1B3">xxxx</text>
<rect x="310" y="182" width="104" height="40" rx="7" fill="none" stroke="#99A1B3" stroke-width="2"/>
<text x="318" y="208" text-anchor="start" font-size="15" fill="#149ECA" font-weight="bold">10</text>
<text x="336" y="208" text-anchor="start" font-size="15" fill="#99A1B3">xxxxxx</text>
<rect x="424" y="182" width="104" height="40" rx="7" fill="none" stroke="#99A1B3" stroke-width="2"/>
<text x="432" y="208" text-anchor="start" font-size="15" fill="#149ECA" font-weight="bold">10</text>
<text x="450" y="208" text-anchor="start" font-size="15" fill="#99A1B3">xxxxxx</text>
<text x="694" y="208" text-anchor="end" font-size="13" fill="#F6F7F9" font-family="system-ui, sans-serif">16 bits</text>
<text x="26" y="270" text-anchor="start" font-size="13" fill="#F6F7F9">U+10000–U+10FFFF</text>
<rect x="196" y="244" width="104" height="40" rx="7" fill="none" stroke="#99A1B3" stroke-width="2"/>
<text x="204" y="270" text-anchor="start" font-size="15" fill="#149ECA" font-weight="bold">11110</text>
<text x="250" y="270" text-anchor="start" font-size="15" fill="#99A1B3">xxx</text>
<rect x="310" y="244" width="104" height="40" rx="7" fill="none" stroke="#99A1B3" stroke-width="2"/>
<text x="318" y="270" text-anchor="start" font-size="15" fill="#149ECA" font-weight="bold">10</text>
<text x="336" y="270" text-anchor="start" font-size="15" fill="#99A1B3">xxxxxx</text>
<rect x="424" y="244" width="104" height="40" rx="7" fill="none" stroke="#99A1B3" stroke-width="2"/>
<text x="432" y="270" text-anchor="start" font-size="15" fill="#149ECA" font-weight="bold">10</text>
<text x="450" y="270" text-anchor="start" font-size="15" fill="#99A1B3">xxxxxx</text>
<rect x="538" y="244" width="104" height="40" rx="7" fill="none" stroke="#99A1B3" stroke-width="2"/>
<text x="546" y="270" text-anchor="start" font-size="15" fill="#149ECA" font-weight="bold">10</text>
<text x="564" y="270" text-anchor="start" font-size="15" fill="#99A1B3">xxxxxx</text>
<text x="694" y="270" text-anchor="end" font-size="13" fill="#F6F7F9" font-family="system-ui, sans-serif">21 bits</text>
<text x="360" y="324" text-anchor="middle" font-size="13" fill="#149ECA" font-family="system-ui, sans-serif">every continuation byte starts with 10 — used for nothing else</text>
</svg>