<svg xmlns="http://www.w3.org/2000/svg" width="640" height="280" viewBox="0 0 640 280" font-family="ui-sans-serif, system-ui, sans-serif">
  <!-- Background -->
  <rect width="640" height="280" fill="#F6F7F9" rx="12"/>

  <!-- Title -->
  <text x="320" y="28" text-anchor="middle" font-size="13" font-weight="600" fill="#404756">Each new switch doubles the combinations</text>

  <!-- ROW 1: 1 switch -->
  <text x="24" y="68" font-size="12" fill="#99A1B3" font-weight="500">1 switch</text>

  <!-- Switch ON -->
  <rect x="24" y="78" width="52" height="30" rx="15" fill="#087EA4"/>
  <circle cx="61" cy="93" r="13" fill="white"/>
  <text x="51" y="115" text-anchor="middle" font-size="10" fill="#087EA4" font-weight="600">ON</text>

  <!-- Switch OFF -->
  <rect x="86" y="78" width="52" height="30" rx="15" fill="#EBECF0"/>
  <circle cx="99" cy="93" r="13" fill="white"/>
  <text x="113" y="115" text-anchor="middle" font-size="10" fill="#99A1B3" font-weight="600">OFF</text>

  <!-- Arrow -->
  <line x1="158" y1="93" x2="190" y2="93" stroke="#C8CBD0" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="190,88 200,93 190,98" fill="#C8CBD0"/>

  <!-- Result -->
  <rect x="205" y="72" width="120" height="42" rx="8" fill="white" stroke="#EBECF0" stroke-width="1.5"/>
  <text x="265" y="89" text-anchor="middle" font-size="22" font-weight="700" fill="#087EA4">2</text>
  <text x="265" y="106" text-anchor="middle" font-size="11" fill="#404756">combinations</text>

  <!-- ROW 2: 2 switches -->
  <text x="24" y="152" font-size="12" fill="#99A1B3" font-weight="500">2 switches</text>

  <rect x="24" y="160" width="52" height="30" rx="15" fill="#087EA4"/>
  <circle cx="61" cy="175" r="13" fill="white"/>
  <rect x="86" y="160" width="52" height="30" rx="15" fill="#087EA4"/>
  <circle cx="123" cy="175" r="13" fill="white"/>

  <!-- small combos -->
  <text x="152" y="163" font-size="9" fill="#99A1B3">●● ●○</text>
  <text x="152" y="177" font-size="9" fill="#99A1B3">○● ○○</text>

  <line x1="196" y1="175" x2="228" y2="175" stroke="#C8CBD0" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="228,170 238,175 228,180" fill="#C8CBD0"/>

  <rect x="243" y="154" width="120" height="42" rx="8" fill="white" stroke="#EBECF0" stroke-width="1.5"/>
  <text x="303" y="171" text-anchor="middle" font-size="22" font-weight="700" fill="#087EA4">4</text>
  <text x="303" y="188" text-anchor="middle" font-size="11" fill="#404756">combinations</text>

  <!-- ROW 3: 3 switches -->
  <text x="24" y="232" font-size="12" fill="#99A1B3" font-weight="500">3 switches</text>

  <rect x="24" y="240" width="52" height="30" rx="15" fill="#087EA4"/>
  <circle cx="61" cy="255" r="13" fill="white"/>
  <rect x="86" y="240" width="52" height="30" rx="15" fill="#087EA4"/>
  <circle cx="123" cy="255" r="13" fill="white"/>
  <rect x="148" y="240" width="52" height="30" rx="15" fill="#EBECF0"/>
  <circle cx="161" cy="255" r="13" fill="white"/>

  <line x1="214" y1="255" x2="246" y2="255" stroke="#C8CBD0" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="246,250 256,255 246,260" fill="#C8CBD0"/>

  <rect x="261" y="234" width="120" height="42" rx="8" fill="white" stroke="#EBECF0" stroke-width="1.5"/>
  <text x="321" y="251" text-anchor="middle" font-size="22" font-weight="700" fill="#087EA4">8</text>
  <text x="321" y="268" text-anchor="middle" font-size="11" fill="#404756">combinations</text>

  <!-- Formula box -->
  <rect x="420" y="60" width="196" height="160" rx="10" fill="white" stroke="#087EA4" stroke-width="1.5"/>
  <text x="518" y="86" text-anchor="middle" font-size="12" fill="#087EA4" font-weight="700">Formula</text>
  <line x1="436" y1="94" x2="600" y2="94" stroke="#EBECF0" stroke-width="1"/>

  <text x="518" y="120" text-anchor="middle" font-size="26" font-weight="800" fill="#23272F">2ⁿ</text>
  <text x="518" y="148" text-anchor="middle" font-size="12" fill="#404756">n = number of switches</text>

  <rect x="444" y="158" width="148" height="22" rx="6" fill="#F0F9FF"/>
  <text x="518" y="173" text-anchor="middle" font-size="11" fill="#087EA4">n bits → 2ⁿ states</text>

  <text x="518" y="206" text-anchor="middle" font-size="11" fill="#99A1B3">1→2  2→4  3→8  ...</text>
</svg>
