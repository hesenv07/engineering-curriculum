<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <defs>
    <marker id="arrH" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#087EA4"/>
    </marker>
  </defs>
  <text x="340" y="34" text-anchor="middle" font-size="16" fill="#23272F" font-family="system-ui, sans-serif">Split the bits into groups of 4 &#8212; each group becomes one hex digit</text>

  <!-- 4-bit group boxes -->
  <g font-size="26" text-anchor="middle">
    <rect x="40"  y="62" width="130" height="54" rx="8" fill="none" stroke="#99A1B3" stroke-width="1.5"/>
    <rect x="190" y="62" width="130" height="54" rx="8" fill="none" stroke="#99A1B3" stroke-width="1.5"/>
    <rect x="340" y="62" width="130" height="54" rx="8" fill="none" stroke="#99A1B3" stroke-width="1.5"/>
    <rect x="490" y="62" width="130" height="54" rx="8" fill="none" stroke="#99A1B3" stroke-width="1.5"/>
    <text x="105" y="98" fill="#23272F">1010</text>
    <text x="255" y="98" fill="#23272F">1111</text>
    <text x="405" y="98" fill="#23272F">0101</text>
    <text x="555" y="98" fill="#23272F">0011</text>
  </g>

  <!-- arrows down -->
  <g stroke="#087EA4" stroke-width="2" fill="none">
    <line x1="105" y1="126" x2="105" y2="164" marker-end="url(#arrH)"/>
    <line x1="255" y1="126" x2="255" y2="164" marker-end="url(#arrH)"/>
    <line x1="405" y1="126" x2="405" y2="164" marker-end="url(#arrH)"/>
    <line x1="555" y1="126" x2="555" y2="164" marker-end="url(#arrH)"/>
  </g>
  <!-- decimal hints -->
  <g font-size="12" fill="#99A1B3" font-family="system-ui, sans-serif">
    <text x="120" y="150">= 10</text>
    <text x="270" y="150">= 15</text>
    <text x="420" y="150">= 5</text>
    <text x="570" y="150">= 3</text>
  </g>

  <!-- hex digits -->
  <g font-size="38" text-anchor="middle" fill="#087EA4" font-weight="bold">
    <text x="105" y="208">A</text>
    <text x="255" y="208">F</text>
    <text x="405" y="208">5</text>
    <text x="555" y="208">3</text>
  </g>

  <text x="340" y="268" text-anchor="middle" font-size="28" fill="#23272F"><tspan fill="#087EA4" font-weight="bold">0xAF53</tspan></text>
  <text x="340" y="300" text-anchor="middle" font-size="13" fill="#99A1B3" font-family="system-ui, sans-serif">1 hex digit = 4 bits &#183; 1 byte = exactly 2 hex digits &#183; no math needed, just substitution</text>
</svg>
