<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <defs>
    <marker id="arrD" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#E06C60"/>
    </marker>
  </defs>

  <!-- dial -->
  <circle cx="320" cy="196" r="108" fill="none" stroke="#99A1B3" stroke-width="2"/>
  <!-- ticks -->
  <g stroke="#99A1B3" stroke-width="2">
    <line x1="320" y1="88"  x2="320" y2="102"/>
    <line x1="428" y1="196" x2="414" y2="196"/>
    <line x1="320" y1="304" x2="320" y2="290"/>
    <line x1="212" y1="196" x2="226" y2="196"/>
  </g>
  <!-- labels -->
  <g font-size="17" text-anchor="middle" fill="#F6F7F9">
    <text x="335" y="76">0</text>
    <text x="452" y="202">64</text>
    <text x="320" y="330">128</text>
    <text x="186" y="202">192</text>
    <text x="270" y="80" fill="#E06C60">255</text>
  </g>
  <text x="320" y="192" text-anchor="middle" font-size="15" fill="#99A1B3" font-family="system-ui, sans-serif">8-bit counter</text>
  <text x="320" y="214" text-anchor="middle" font-size="13" fill="#99A1B3" font-family="system-ui, sans-serif">256 states</text>

  <!-- danger arc: 255 crossing over to 0 -->
  <path d="M 286 84 A 112 112 0 0 1 352 86" fill="none" stroke="#E06C60" stroke-width="3" marker-end="url(#arrD)"/>

  <text x="320" y="40" text-anchor="middle" font-size="20" fill="#E06C60">255 + 1 = 0</text>
  <text x="428" y="62" text-anchor="middle" font-size="14" fill="#E06C60" font-family="system-ui, sans-serif">overflow</text>
  <text x="320" y="354" text-anchor="middle" font-size="13" fill="#99A1B3" font-family="system-ui, sans-serif">Pac-Man level 256 &#183; Gangnam Style views &#183; Boeing 787 &#183; Y2038 &#8212; same wheel, bigger dial</text>
</svg>
