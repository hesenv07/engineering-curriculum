<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 260" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <defs>
    <marker id="arrN" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#087EA4"/>
    </marker>
  </defs>
  <text x="360" y="36" text-anchor="middle" font-size="16" fill="#23272F" font-family="system-ui, sans-serif">Negating a number: flip every bit, then add 1</text>

  <!-- box 1: +5 -->
  <rect x="30" y="80" width="190" height="60" rx="10" fill="none" stroke="#99A1B3" stroke-width="1.5"/>
  <text x="125" y="112" text-anchor="middle" font-size="22" fill="#23272F">00000101</text>
  <text x="125" y="132" text-anchor="middle" font-size="13" fill="#99A1B3">+5</text>

  <line x1="228" y1="110" x2="268" y2="110" stroke="#087EA4" stroke-width="2" marker-end="url(#arrN)"/>
  <text x="248" y="92" text-anchor="middle" font-size="12" fill="#087EA4" font-family="system-ui, sans-serif">flip all bits</text>

  <!-- box 2: inverted -->
  <rect x="275" y="80" width="190" height="60" rx="10" fill="none" stroke="#99A1B3" stroke-width="1.5"/>
  <text x="370" y="112" text-anchor="middle" font-size="22" fill="#23272F">11111010</text>
  <text x="370" y="132" text-anchor="middle" font-size="13" fill="#99A1B3">inverted</text>

  <line x1="473" y1="110" x2="513" y2="110" stroke="#087EA4" stroke-width="2" marker-end="url(#arrN)"/>
  <text x="493" y="92" text-anchor="middle" font-size="12" fill="#087EA4" font-family="system-ui, sans-serif">add 1</text>

  <!-- box 3: -5 highlighted -->
  <rect x="520" y="80" width="190" height="60" rx="10" fill="#087EA4" fill-opacity="0.12" stroke="#087EA4" stroke-width="2"/>
  <text x="615" y="112" text-anchor="middle" font-size="22" fill="#087EA4">11111011</text>
  <text x="615" y="132" text-anchor="middle" font-size="13" fill="#087EA4">&#8722;5</text>

  <text x="360" y="196" text-anchor="middle" font-size="15" fill="#23272F" font-family="system-ui, sans-serif">Check by adding:  00000101 + 11111011 = 1 00000000</text>
  <text x="360" y="222" text-anchor="middle" font-size="13" fill="#99A1B3" font-family="system-ui, sans-serif">The 9th bit falls off the 8-bit register &#8594; result is 00000000 = 0. So 11111011 really behaves as &#8722;5.</text>
</svg>
