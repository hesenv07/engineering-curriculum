<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 310" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <text x="360" y="34" text-anchor="middle" font-size="16" fill="#23272F" font-family="system-ui, sans-serif">The deepest view: the MSB's weight is negative</text>

  <!-- 8 digit boxes: 1 1 1 1 1 0 1 1 -->
  <g font-size="26" text-anchor="middle">
    <rect x="52"  y="60" width="66" height="54" rx="8" fill="#C1554D" fill-opacity="0.12" stroke="#C1554D" stroke-width="2"/>
    <rect x="134" y="60" width="66" height="54" rx="8" fill="#087EA4" fill-opacity="0.12" stroke="#087EA4" stroke-width="1.5"/>
    <rect x="216" y="60" width="66" height="54" rx="8" fill="#087EA4" fill-opacity="0.12" stroke="#087EA4" stroke-width="1.5"/>
    <rect x="298" y="60" width="66" height="54" rx="8" fill="#087EA4" fill-opacity="0.12" stroke="#087EA4" stroke-width="1.5"/>
    <rect x="380" y="60" width="66" height="54" rx="8" fill="#087EA4" fill-opacity="0.12" stroke="#087EA4" stroke-width="1.5"/>
    <rect x="462" y="60" width="66" height="54" rx="8" fill="none" stroke="#99A1B3" stroke-width="1.5"/>
    <rect x="544" y="60" width="66" height="54" rx="8" fill="#087EA4" fill-opacity="0.12" stroke="#087EA4" stroke-width="1.5"/>
    <rect x="626" y="60" width="66" height="54" rx="8" fill="#087EA4" fill-opacity="0.12" stroke="#087EA4" stroke-width="1.5"/>
    <text x="85"  y="96" fill="#C1554D">1</text>
    <text x="167" y="96" fill="#087EA4">1</text>
    <text x="249" y="96" fill="#087EA4">1</text>
    <text x="331" y="96" fill="#087EA4">1</text>
    <text x="413" y="96" fill="#087EA4">1</text>
    <text x="495" y="96" fill="#99A1B3">0</text>
    <text x="577" y="96" fill="#087EA4">1</text>
    <text x="659" y="96" fill="#087EA4">1</text>
  </g>

  <!-- weights -->
  <g font-size="17" text-anchor="middle">
    <text x="85"  y="146" fill="#C1554D">&#8722;128</text>
    <text x="167" y="146" fill="#23272F">64</text>
    <text x="249" y="146" fill="#23272F">32</text>
    <text x="331" y="146" fill="#23272F">16</text>
    <text x="413" y="146" fill="#23272F">8</text>
    <text x="495" y="146" fill="#99A1B3">4</text>
    <text x="577" y="146" fill="#23272F">2</text>
    <text x="659" y="146" fill="#23272F">1</text>
  </g>
  <text x="85" y="170" text-anchor="middle" font-size="12" fill="#C1554D" font-family="system-ui, sans-serif">only this weight is negative</text>

  <text x="360" y="226" text-anchor="middle" font-size="22" fill="#23272F">&#8722;128 + 64 + 32 + 16 + 8 + 2 + 1 = <tspan fill="#087EA4" font-weight="bold">&#8722;5</tspan></text>
  <text x="360" y="262" text-anchor="middle" font-size="13" fill="#99A1B3" font-family="system-ui, sans-serif">Everything else works exactly like ordinary binary &#8212; positions, weights, addition.</text>
  <text x="360" y="284" text-anchor="middle" font-size="13" fill="#99A1B3" font-family="system-ui, sans-serif">The MSB isn't a "minus sign flag" &#8212; it's a regular position that happens to weigh &#8722;2&#8319;&#8315;&#185;.</text>
</svg>
