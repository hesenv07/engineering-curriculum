<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <defs>
    <marker id="arrC" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#E06C60"/>
    </marker>
  </defs>

  <circle cx="320" cy="210" r="115" fill="none" stroke="#99A1B3" stroke-width="2"/>
  <g stroke="#99A1B3" stroke-width="2">
    <line x1="320" y1="95"  x2="320" y2="110"/>
    <line x1="435" y1="210" x2="420" y2="210"/>
    <line x1="320" y1="325" x2="320" y2="310"/>
    <line x1="205" y1="210" x2="220" y2="210"/>
  </g>

  <g font-size="17" text-anchor="middle">
    <text x="320" y="82" fill="#F6F7F9">0</text>
    <text x="462" y="216" fill="#F6F7F9">+64</text>
    <text x="366" y="348" fill="#F6F7F9">+127</text>
    <text x="268" y="348" fill="#E06C60">&#8722;128</text>
    <text x="176" y="216" fill="#F6F7F9">&#8722;64</text>
    <text x="272" y="86" fill="#F6F7F9">&#8722;1</text>
  </g>

  <text x="320" y="200" text-anchor="middle" font-size="15" fill="#99A1B3" font-family="system-ui, sans-serif">8-bit signed</text>
  <text x="320" y="222" text-anchor="middle" font-size="13" fill="#99A1B3" font-family="system-ui, sans-serif">right half: positive</text>
  <text x="320" y="240" text-anchor="middle" font-size="13" fill="#99A1B3" font-family="system-ui, sans-serif">left half: negative</text>

  <!-- danger arc at the bottom between +127 and -128 -->
  <path d="M 352 322 A 118 118 0 0 1 288 322" fill="none" stroke="#E06C60" stroke-width="3" marker-end="url(#arrC)"/>
  <text x="320" y="384" text-anchor="middle" font-size="17" fill="#E06C60">+127 + 1 = &#8722;128</text>

  <text x="320" y="34" text-anchor="middle" font-size="16" fill="#F6F7F9" font-family="system-ui, sans-serif">Two's complement bends the dial: half the circle goes negative</text>
</svg>
